name: Build and Deploy Catalog API

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: |
        dotnet restore src/Catalog.API/Catalog.API.csproj

    - name: Build
      run: |
        dotnet build src/Catalog.API/Catalog.API.csproj \
        --configuration Release

    - name: Test
      run: |
        dotnet test

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login ECR
      id: ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build \
        -t catalog-api:${{ github.sha }} \
        -f src/Catalog.API/Dockerfile .

    - name: Tag Image
      run: |
        docker tag catalog-api:${{ github.sha }} \
        ${{ steps.ecr.outputs.registry }}/catalog-api:${{ github.sha }}

    - name: Push Image
      run: |
        docker push \
        ${{ steps.ecr.outputs.registry }}/catalog-api:${{ github.sha }}

    - name: Download Task Definition
      run: |
        aws ecs describe-task-definition \
        --task-definition catalog-api-task \
        --query taskDefinition \
        > task-definition.json

    - name: Render Task Definition
      id: taskdef
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: catalog-api
        image: ${{ steps.ecr.outputs.registry }}/catalog-api:${{ github.sha }}

    - name: Deploy ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.taskdef.outputs.task-definition }}
        service: catalog-api-service
        cluster: eshop-prod-cluster
        wait-for-service-stability: true# This workflow uses actions that are not certified by GitHub.
